<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0E1117;
      overflow: hidden;
      position: relative;
    }
    #tradingview_chart {
      width: 100%;
      height: 100%;
    }
    .logo-cover-left {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 150px;
      height: 60px;
      background-color: #131722;
      z-index: 9999;
      pointer-events: none;
    }
    .logo-cover-right {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 150px;
      height: 60px;
      background-color: #131722;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <div id="tradingview_chart"></div>
  <!--
    Logo covers are commented out to test Method 2 (JavaScript Injection).
    Note: If the chart runs in a cross-origin iframe (e.g. from s3.tradingview.com) 
    and is blocked by Same-Origin Policy (CORS), these covers are the only reliable way 
    to hide the branding. Uncomment them if the JS injection fails to hide the logo.
    <div class="logo-cover-left"></div>
    <div class="logo-cover-right"></div>
  -->
  <script type="text/javascript">
    var lastSavedData = "";
    var restoredData = null;

    function log(msg) {
      if (window.Logger) {
        window.Logger.postMessage(msg);
      } else {
        console.log(msg);
      }
    }

    // Save chart settings (preferences like theme, resolution) to Flutter
    // Note: The free TradingView widget does NOT store user drawings (lines, shapes)
    // in localStorage. Only chart settings are persisted here.
    window.saveDrawings = function() {
      try {
        var data = {};
        var storage = window.localStorage;
        if (storage && storage.length > 0) {
          for (var i = 0; i < storage.length; i++) {
            var key = storage.key(i);
            data[key] = storage.getItem(key);
          }
        }

        var jsonStr = JSON.stringify(data);
        if (jsonStr !== lastSavedData && jsonStr !== '{}') {
          lastSavedData = jsonStr;
          if (window.DrawingSaver) {
            window.DrawingSaver.postMessage(jsonStr);
          }
        }
      } catch (e) {
        log("saveSettings error: " + e.message);
      }
    };

    // Restore chart settings from Flutter into localStorage
    window.restoreDrawings = function(base64Data) {
      try {
        if (!base64Data) return;
        var jsonData = atob(base64Data);
        restoredData = JSON.parse(jsonData);
        
        // Write settings to parent localStorage so the widget reads them on init
        var storage = window.localStorage;
        for (var key in restoredData) {
          storage.setItem(key, restoredData[key]);
        }
        log("restoreSettings: Restored " + Object.keys(restoredData).length + " keys");
      } catch (e) {
        log("restoreSettings error: " + e.message);
      }
    };

    // Periodically save chart settings every 3 seconds
    setInterval(window.saveDrawings, 3000);

    window.loadChart = function(symbol) {
      if (typeof TradingView === 'undefined') {
        setTimeout(function() {
          window.loadChart(symbol);
        }, 100);
        return;
      }
      
      document.getElementById('tradingview_chart').innerHTML = '';
      new TradingView.widget({
        "autosize": true,
        "symbol": symbol,
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "no_referral_id": true,
        "container_id": "tradingview_chart"
      });
    };
  </script>
</body>
</html>

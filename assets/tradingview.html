<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0E1117;
      overflow: hidden;
      position: relative;
    }
    #tradingview_chart {
      width: 100%;
      height: 100%;
    }
    .logo-cover-left {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 150px;
      height: 60px;
      background-color: #131722;
      z-index: 9999;
      pointer-events: none;
    }
    .logo-cover-right {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 150px;
      height: 60px;
      background-color: #131722;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>
  <div id="tradingview_chart"></div>
  <!--
    Logo covers are commented out to test Method 2 (JavaScript Injection).
    Note: If the chart runs in a cross-origin iframe (e.g. from s3.tradingview.com) 
    and is blocked by Same-Origin Policy (CORS), these covers are the only reliable way 
    to hide the branding. Uncomment them if the JS injection fails to hide the logo.
    <div class="logo-cover-left"></div>
    <div class="logo-cover-right"></div>
  -->
  <script type="text/javascript">
    window.loadChart = function(symbol) {
      if (typeof TradingView === 'undefined') {
        // Retry if tv.js script is not fully loaded/executed yet
        setTimeout(function() {
          window.loadChart(symbol);
        }, 100);
        return;
      }
      document.getElementById('tradingview_chart').innerHTML = '';
      new TradingView.widget({
        "autosize": true,
        "symbol": symbol,
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "enable_publishing": false,
        "hide_side_toolbar": false,
        "allow_symbol_change": true,
        "no_referral_id": true,
        "container_id": "tradingview_chart"
      });
    };
  </script>
</body>
</html>
